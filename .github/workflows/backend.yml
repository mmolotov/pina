name: Backend CI

on:
  push:
    branches: [main]
    paths: ['backend/**']
  pull_request:
    paths: ['backend/**']

defaults:
  run:
    working-directory: backend

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: pina_test
          POSTGRES_USER: pina
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD || 'pina' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pina"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v6

      - name: Check formatting
        run: ./gradlew spotlessCheck

      - name: Build & test
        run: ./gradlew build
        env:
          QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://localhost:5432/pina_test
          QUARKUS_DATASOURCE_USERNAME: pina
          QUARKUS_DATASOURCE_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD || 'pina' }}

      - name: Check coverage threshold
        run: ./gradlew jacocoTestCoverageVerification
        env:
          QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://localhost:5432/pina_test
          QUARKUS_DATASOURCE_USERNAME: pina
          QUARKUS_DATASOURCE_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD || 'pina' }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: build/jacoco-report/

      - name: Static analysis
        run: ./gradlew spotbugsMain
