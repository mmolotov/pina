name: Backend CI

on:
  push:
    branches: [main]
    paths: ['backend/**']
  pull_request:
    paths: ['backend/**']

defaults:
  run:
    working-directory: backend

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Start PostgreSQL
        run: |
          docker run -d --name postgres \
            -e POSTGRES_DB=pina_test \
            -e POSTGRES_USER=pina \
            -e POSTGRES_PASSWORD=${{ secrets.CI_POSTGRES_PASSWORD || 'pina' }} \
            -p 5432:5432 \
            --health-cmd "pg_isready -U pina" \
            --health-interval 10s \
            --health-timeout 5s \
            --health-retries 5 \
            pgvector/pgvector:pg17
        working-directory: .

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            docker inspect --format='{{.State.Health.Status}}' postgres 2>/dev/null | grep -q healthy && exit 0
            sleep 2
          done
          echo "PostgreSQL failed to start" && exit 1
        working-directory: .

      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v6

      - name: Check formatting
        run: ./gradlew spotlessCheck

      - name: Build & test
        id: build
        run: ./gradlew build
        env:
          QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://localhost:5432/pina_test
          QUARKUS_DATASOURCE_USERNAME: pina
          QUARKUS_DATASOURCE_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD || 'pina' }}

      - name: Check coverage threshold
        run: ./gradlew jacocoTestCoverageVerification
        env:
          QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://localhost:5432/pina_test
          QUARKUS_DATASOURCE_USERNAME: pina
          QUARKUS_DATASOURCE_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD || 'pina' }}

      - name: Test report
        uses: dorny/test-reporter@v3
        if: always() && steps.build.outcome != 'skipped'
        with:
          name: Test Results
          path: backend/build/test-results/test/*.xml
          reporter: java-junit
          fail-on-empty: false

      - name: Coverage report
        uses: madrapps/jacoco-report@v1.7.2
        if: github.event_name == 'pull_request' && steps.build.outcome == 'success'
        with:
          paths: backend/build/jacoco-report/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 70
          min-coverage-changed-files: 70
          title: "Coverage Report"
          update-comment: true

      - name: Upload coverage HTML
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: backend/build/jacoco-report/

      - name: Static analysis
        run: ./gradlew spotbugsMain
