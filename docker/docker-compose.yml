services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pina}
      POSTGRES_USER: ${POSTGRES_USER:-pina}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pina}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pina}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-pina}
      QUARKUS_DATASOURCE_USERNAME: ${POSTGRES_USER:-pina}
      QUARKUS_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-pina}
      QUARKUS_HTTP_CORS_ORIGINS: http://localhost:*,https://localhost:*
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/q/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
