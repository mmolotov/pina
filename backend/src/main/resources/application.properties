# Application
quarkus.application.name=pina-backend
quarkus.application.version=0.1.0

# Database
quarkus.datasource.db-kind=postgresql
# Hibernate
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
# Flyway
quarkus.flyway.migrate-at-start=true
# Dev services (auto-starts PostgreSQL in dev/test mode)
quarkus.datasource.devservices.image-name=pgvector/pgvector:pg17

# JWT
mp.jwt.verify.publickey.location=${pina.jwt.public-key:dev-keys/publicKey.pem}
mp.jwt.verify.issuer=pina-backend
smallrye.jwt.sign.key.location=${pina.jwt.private-key:dev-keys/privateKey.pem}
smallrye.jwt.new-token.issuer=pina-backend
smallrye.jwt.new-token.lifespan=900

# Security
quarkus.http.auth.permission.authenticated.paths=/api/v1/*
quarkus.http.auth.permission.authenticated.policy=authenticated
quarkus.http.auth.permission.public-auth.paths=/api/v1/auth/register,/api/v1/auth/login,/api/v1/auth/google,/api/v1/auth/refresh,/api/v1/auth/logout
quarkus.http.auth.permission.public-auth.policy=permit
quarkus.http.auth.permission.public-invites.paths=/api/v1/invites/*
quarkus.http.auth.permission.public-invites.policy=permit
quarkus.http.auth.permission.public-health.paths=/api/v1/health,/q/*
quarkus.http.auth.permission.public-health.policy=permit

# Google OIDC (set to enable Google login)
#pina.auth.google.client-id=your-client-id.apps.googleusercontent.com

# BCrypt
pina.auth.bcrypt.cost=12
%test.pina.auth.bcrypt.cost=4

# Refresh tokens
pina.auth.refresh-token.lifespan=2592000

# HTTP
quarkus.http.port=8080
quarkus.http.cors.origins=http://localhost:*,https://localhost:*
quarkus.http.limits.max-body-size=50M
# OpenAPI
quarkus.smallrye-openapi.info-title=PINA API
quarkus.smallrye-openapi.info-version=0.1.0
quarkus.smallrye-openapi.info-description=Private Image Network Archive API
quarkus.swagger-ui.always-include=true

# Storage
pina.storage.provider=local
pina.storage.local.base-path=data

# Photo processing
pina.photo.store-original=true
pina.photo.compression.format=jpeg
pina.photo.compression.quality=82
pina.photo.compression.max-resolution=2560
pina.photo.thumbnails.sm-size=256
pina.photo.thumbnails.md-width=1280
pina.photo.thumbnails.lg-width=1920
