# Application
quarkus.application.name=pina-backend
quarkus.application.version=0.1.0

# Database
quarkus.datasource.db-kind=postgresql
# Hibernate
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
# Flyway
quarkus.flyway.migrate-at-start=true
# Dev services (auto-starts PostgreSQL in dev/test mode)
quarkus.datasource.devservices.image-name=pgvector/pgvector:pg17

# HTTP
quarkus.http.port=8080
quarkus.http.cors.origins=http://localhost:*,https://localhost:*
quarkus.http.limits.max-body-size=50M
# OpenAPI
quarkus.smallrye-openapi.info-title=PINA API
quarkus.smallrye-openapi.info-version=0.1.0
quarkus.smallrye-openapi.info-description=Private Image Network Archive API
quarkus.swagger-ui.always-include=true

# Storage
pina.storage.provider=local
pina.storage.local.base-path=data

# Photo processing
pina.photo.store-original=true
pina.photo.compression.format=jpeg
pina.photo.compression.quality=82
pina.photo.compression.max-resolution=2560
pina.photo.thumbnails.sm-size=256
pina.photo.thumbnails.md-width=1280
pina.photo.thumbnails.lg-width=1920

# Testing
quarkus.jacoco.data-file=build/jacoco/jacoco-quarkus.exec
